kind: pipeline
type: docker
name: default

platform:
  os: linux
  arch: amd64

steps:
- name: restore-cache
  image: drillster/drone-volume-cache
  volumes:
  - name: cache
    path: /cache
  settings:
    restore: true
    mount:
    - vendor
    ttl: 7

- name: build
  image: ruby:3.0
  commands:
    - echo "" > ./_includes/umami.html
    - "echo \"url: 'https://staging.lder.dev'\" > ./_config_dev.yml"
    - "echo \"baseurl: '/${DRONE_REPO}'\" >> ./_config_dev.yml"
    - "echo \"title: '${DRONE_REPO}'\" >> ./_config_dev.yml"
    - bundle install
    - bundle config set --local deployment 'true'
    - JEKYLL_ENV=production bundle exec jekyll build --verbose --config _config.yml,_config_dev.yml

- name: rebuild-cache
  image: drillster/drone-volume-cache 
  volumes:
  - name: cache
    path: /cache
  settings:
    rebuild: true
    mount:
    - vendor

- name: stage
  image: appleboy/drone-scp
  settings:
    host: ssh.staging.lder.dev
    username: 
      from_secret: staging_username
    password: 
      from_secret: staging_password
    port: 22
    target: /var/www/html/${DRONE_REPO}/
    source: _site
    strip_components: 1
    overwrite: true

trigger:
  branch:
  - main

volumes:
- name: cache
  host:
    path: /var/lib/drone/temp

branches: main

---
kind: pipeline
type: docker
name: deploy
steps:
- name: deploy
  image: appleboy/drone-git-push
  settings:
    ssh_key:
      from_secret: github_ssh_key
    branch: main
    remote: git@github.com:jamolnng/lder.dev.git
    force: false
    commit: false
trigger:
  event:
  - promote
  target:
  - production
branches: main
kind: pipeline
type: docker
name: default

platform:
  os: linux
  arch: amd64

steps:
- name: restore-cache
  image: drillster/drone-volume-cache
  volumes:
  - name: cache
    path: /cache
  settings:
    restore: true
    mount:
    - vendor
  ttl: 7

- name: build
  image: ruby:3.0
  commands:
    - bundle config set --local deployment 'true'
    - bundle install
    - JEKYLL_ENV=production bundle exec jekyll build --verbose

- name: rebuild-cache
  image: drillster/drone-volume-cache 
  volumes:
  - name: cache
    path: /cache
  settings:
    rebuild: true
    mount:
    - vendor

- name: stage
  image: appleboy/drone-scp
  settings:
    host: ssh.staging.lder.dev
    username: 
      from_secret: staging_username
    password: 
      from_secret: staging_password
    port: 22
    target: /var/www/html/${DRONE_REPO}/
    source: _site

trigger:
  branch:
  - main

volumes:
- name: cache
  host:
    path: /var/lib/drone/temp

branches: main

---
kind: pipeline
type: docker
name: deploy

steps:
- name: deploy
  image: plugins/webhook
  settings:
    urls: https://git.lder.dev/api/v1/repos/jesse/lder.dev/mirror-sync
    method: POST
    content_type: application/json
    headers:
      Authorization:
        from_secret: gitea_token

trigger:
  event:
  - promote
  target:
  - production

branches: main